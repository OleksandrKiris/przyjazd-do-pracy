<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f7a8c">
    <title>Generator linku dla kandydata</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="share.css">
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand-head">
          <p class="brand-kicker">Narzędzie wewnętrzne</p>
          <h1>Generator linku</h1>
        </div>
      </header>

      <main>
        <section class="candidate-section" aria-labelledby="candidateLinkTitle">
          <div>
            <h2 id="candidateLinkTitle">Przygotuj link dla kandydata</h2>
            <p>Ta strona jest tylko do przygotowania wiadomości. Kandydat otrzyma czysty link do instrukcji dojazdu.</p>
          </div>

          <div class="candidate-form">
            <label>
              <span>Język kandydata</span>
              <select id="candidateLang">
                <option value="pl">Polski</option>
                <option value="uk">Українська</option>
                <option value="ru">Русский</option>
                <option value="en">English</option>
                <option value="ka">ქართული</option>
                <option value="az">Azərbaycanca</option>
              </select>
            </label>
            <label>
              <span>Lokalizacja</span>
              <select id="candidateLocation">
                <option value="siechnice">Siechnice</option>
                <option value="ryczywol">Ryczywół</option>
                <option value="bogatynia">Bogatynia</option>
                <option value="zgorzelec">Zgorzelec</option>
              </select>
            </label>
            <label>
              <span>Imię</span>
              <input id="candidateName" type="text" autocomplete="given-name" placeholder="np. Ivan">
            </label>
            <label>
              <span>Nazwisko</span>
              <input id="candidateSurname" type="text" autocomplete="family-name" placeholder="np. Petrenko">
            </label>
            <label>
              <span>Data przyjazdu</span>
              <input id="candidateDate" type="date">
            </label>
            <label>
              <span>Dział</span>
              <select id="candidateDepartment">
                <option value="production">Produkcja</option>
                <option value="warehouse">Magazyn</option>
                <option value="greenhouse">Szklarnia</option>
              </select>
            </label>
            <label>
              <span>Skąd jedzie</span>
              <select id="candidateCountry">
                <option value="ukraine">Z Ukrainy</option>
                <option value="poland">Jest już w Polsce</option>
                <option value="caucasus">Gruzja / Azerbejdżan</option>
              </select>
            </label>
            <label class="candidate-toggle">
              <input id="candidateHotel" type="checkbox">
              <span>Dodaj informację o zakwaterowaniu</span>
            </label>
          </div>

          <div class="share-box">
            <input id="candidateLink" type="text" readonly aria-label="Gotowy link dla kandydata">
            <div class="button-row">
              <button id="copyCandidateLinkBtn" class="primary" type="button">Kopiuj link</button>
              <button id="openCandidateLinkBtn" type="button">Sprawdź link</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="share.js"></script>
  </body>
</html>
