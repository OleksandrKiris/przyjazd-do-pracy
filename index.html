<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f7a8c">
    <meta name="candidate-page-version" content="v31-color-depth">
    <title>Przyjazd do pracy</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css?v=31-colors">
    <link rel="stylesheet" href="candidate-improvements.css?v=31-colors">
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand-head">
          <div class="brand-logo-lockup" aria-label="CITRONEX HYDRA S.R.Z.B.">
            <img src="assets/citronex-hydra-logo.png" alt="CITRONEX HYDRA S.R.Z.B.">
            <strong>CITRONEX HYDRA S.R.Z.B.</strong>
          </div>
          <p class="brand-kicker" data-i18n="moduleLabel">Modul informacyjny</p>
          <h1 data-i18n="title">Przyjazd do pracy</h1>
        </div>
      </header>

      <main>
      <section class="setup-card">
        <h2 data-i18n="chooseLanguage">Wybierz język</h2>
        <div id="languageGate" class="language-gate"></div>
      </section>

      <section class="location-picker">
        <div class="section-head">
          <h2 data-i18n="chooseLocation">Wybierz lokalizację</h2>
          <p data-i18n="chooseLocationText">Kliknij kafelek miejsca, do którego jedziesz. Strona pokaże instrukcję tylko dla tej lokalizacji.</p>
        </div>
        <div id="locationTiles" class="location-tiles"></div>
      </section>

      <section id="instructionStart" class="summary-band">
        <div class="summary-item">
          <span data-i18n="employee">Pracownik</span>
          <strong id="employeeName">-</strong>
        </div>
        <div class="summary-item">
          <span data-i18n="arrivalDate">Data przyjazdu</span>
          <strong id="arrivalDate">-</strong>
        </div>
        <div class="summary-item">
          <span data-i18n="location">Lokalizacja</span>
          <strong id="locationName">-</strong>
        </div>
        <div class="summary-item">
          <span data-i18n="department">Dzial</span>
          <strong id="departmentName">-</strong>
        </div>
      </section>

      <section id="helpSection" class="help-section"></section>

      <section id="guide" class="guide-grid"></section>

      <section id="contactsPage" class="contacts-section"></section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="data/config.js?v=31-colors"></script>
    <script src="data/overrides.js?v=31-colors"></script>
    <script src="language-options.js?v=31-colors"></script>
    <script src="app.js?v=31-colors"></script>
    <script src="candidate-improvements.js?v=31-colors"></script>
    <script src="translations.js?v=31-colors"></script>
  </body>
</html>
